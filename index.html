<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chapter 15 · Data Detective</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1A3A6B;--navy2:#0D2850;--sky:#D0E8FF;
  --teal:#0D7A7A;--lime:#3D8A10;
  --amber:#B87808;--amber2:#8A5808;--amber-light:#FFF0B0;
  --paper:#F4F8FF;--paper2:#E8F0FC;--paper3:#D8E4F8;
  --ink:#080C18;--ink2:#243060;--ink3:#6878A8;--rule:#B8C8E8;
  --sans:'Syne',sans-serif;--serif:'Instrument Serif',serif;--mono:'Space Mono',monospace;
}
html,body{width:100%;min-height:100vh;background:var(--paper);color:var(--ink);font-family:var(--sans);overflow-x:hidden}

/* ── HEADER ── */
.header{background:var(--navy);padding:0 20px;display:flex;align-items:center;gap:14px;height:56px;border-bottom:3px solid var(--navy2);position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.25)}
.header-title{font-family:var(--serif);font-size:20px;color:#EEF4FF;font-style:italic}
.header-sub{font-family:var(--mono);font-size:10px;color:rgba(238,244,255,0.5);letter-spacing:1.5px;text-transform:uppercase}
.header-tabs{margin-left:auto;display:flex;gap:0;background:rgba(0,0,0,0.25);border-radius:8px;padding:3px}
.tab{padding:7px 12px;font-family:var(--mono);font-size:10px;color:rgba(238,244,255,0.5);cursor:pointer;border-radius:6px;transition:.2s;border:none;background:none}
.tab.on{background:var(--paper);color:var(--ink);font-weight:700}
.tab:hover:not(.on){color:rgba(238,244,255,0.85)}

/* ── LAYOUT ── */
.main{max-width:900px;margin:0 auto;padding:20px 16px 60px}
.pnl{display:none}.pnl.on{display:block}
.card{background:#fff;border:2px solid var(--rule);border-radius:12px;overflow:hidden;margin-bottom:16px;box-shadow:0 4px 16px rgba(10,30,80,0.07)}
.card-head{padding:12px 18px;color:#fff;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.card-body{padding:16px 20px}
.instr{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--ink2);line-height:1.7;margin-bottom:14px}

/* ── SCENARIO INTRO ── */
.scenario-intro{background:var(--sky);border:2px solid var(--rule);border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px}
.scenario-intro-icon{font-size:26px;flex-shrink:0;line-height:1.2}
.scenario-intro-text{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--ink2);line-height:1.65}

/* ── DATASET SWITCHER ── */
.build-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.ds-btn{padding:7px 14px;font-family:var(--mono);font-size:11px;font-weight:700;border-radius:8px;cursor:pointer;border:2px solid var(--rule);background:var(--paper2);color:var(--ink2);transition:.15s}
.ds-btn.on{color:#fff;border-color:transparent}

/* ── TWO COLUMN BUILD LAYOUT ── */
.build-layout{display:grid;grid-template-columns:1fr 1.7fr;gap:16px;align-items:start}

/* ── COUNT CARDS ── */
.count-list{display:flex;flex-direction:column;gap:8px}
.count-item{border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;border:2px solid transparent;transition:.2s}
.count-item.filled{border-color:transparent}
.count-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.count-emoji{font-size:26px;line-height:1;flex-shrink:0}
.count-label{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.count-val-badge{font-family:var(--mono);font-size:13px;font-weight:700;min-width:28px;text-align:center;padding:2px 6px;border-radius:6px;background:rgba(255,255,255,0.6)}
.stepper{display:flex;align-items:center;gap:0;background:rgba(255,255,255,0.55);border:1.5px solid rgba(255,255,255,0.7);border-radius:20px;overflow:hidden;height:30px;flex-shrink:0}
.s-btn{width:30px;height:100%;border:none;background:transparent;font-size:17px;font-weight:700;cursor:pointer;transition:.1s;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;color:inherit}
.s-btn:active{background:rgba(255,255,255,0.4)}
.s-btn:disabled{opacity:.3;cursor:not-allowed}
.s-num{min-width:30px;font-family:var(--mono);font-size:13px;font-weight:700;text-align:center;border-left:1.5px solid rgba(255,255,255,0.5);border-right:1.5px solid rgba(255,255,255,0.5);height:100%;display:flex;align-items:center;justify-content:center;padding:0 2px}

/* ── CANVAS PANEL ── */
.chart-panel{background:var(--paper2);border:2px solid var(--rule);border-radius:12px;padding:12px;position:relative}
.chart-label{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;text-align:center}
#build-canvas{display:block;width:100%;height:auto;border-radius:6px}

/* ── BOTTOM ACTION ROW ── */
.action-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:14px}
.check-btn{padding:10px 22px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.check-btn:hover{background:var(--navy2)}
.reset-btn{padding:10px 18px;background:var(--paper2);border:2px solid var(--rule);border-radius:8px;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;color:var(--ink2);transition:.15s}
.reset-btn:hover{background:var(--paper3)}
.check-result{margin-top:10px;font-family:var(--serif);font-style:italic;font-size:15px;line-height:1.6;min-height:20px}
.check-result.ok{color:var(--lime)}.check-result.no{color:#DC2626}

/* ── READ CHART ── */
.score-bar{display:flex;align-items:center;gap:14px;background:var(--amber-light);border:2px solid var(--amber);border-radius:10px;padding:12px 18px;margin-bottom:14px}
.score-num{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--amber2)}
.score-lbl{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--ink2)}
.new-chart-btn{margin-left:auto;padding:8px 16px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer}
.read-chart-canvas{display:block;width:100%;height:auto;margin-bottom:14px}
.q-card{background:var(--paper2);border:2px solid var(--rule);border-radius:10px;padding:12px 16px;margin-bottom:10px}
.q-num{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.q-text{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ink);margin-bottom:10px;line-height:1.6}
.q-opts{display:flex;flex-wrap:wrap;gap:7px}
.q-opt{padding:8px 16px;background:#fff;border:2px solid var(--rule);border-radius:8px;font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;transition:.2s;color:var(--ink2)}
.q-opt:hover{border-color:var(--navy);background:var(--sky)}
.q-opt.correct{background:#DCFCE7;border-color:#16A34A;color:#14532D;animation:cpop .35s}
.q-opt.wrong{background:#FEE2E2;border-color:#DC2626;color:#7F1D1D;animation:cshk .35s}
.q-fb{margin-top:7px;font-family:var(--serif);font-style:italic;font-size:13px;min-height:16px}
.q-fb.ok{color:#16A34A}.q-fb.no{color:#DC2626}

/* ── PRACTICE ── */
.pr-card{background:#fff;border:2px solid var(--rule);border-radius:12px;padding:20px;margin-bottom:16px}
.pr-q{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--ink);margin-bottom:14px;line-height:1.6}
.pr-opts{display:flex;gap:8px;flex-wrap:wrap}
.pr-opt{padding:10px 18px;background:var(--paper2);border:2px solid var(--rule);border-radius:8px;font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer;transition:.2s;color:var(--ink2)}
.pr-opt:hover{border-color:var(--navy);background:var(--sky)}
.pr-opt.correct{background:#DCFCE7;border-color:#16A34A;color:#14532D;animation:cpop .35s}
.pr-opt.wrong{background:#FEE2E2;border-color:#DC2626;color:#7F1D1D;animation:cshk .35s}
.pr-fb{min-height:22px;margin-top:12px;font-family:var(--serif);font-style:italic;font-size:14px}
.pr-fb.ok{color:#16A34A}.pr-fb.no{color:#DC2626}
.next-btn{margin-top:12px;background:var(--navy);color:#fff;border:none;border-radius:8px;padding:10px 22px;font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer}

@keyframes cpop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes cshk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

@media(max-width:640px){
  .build-layout{grid-template-columns:1fr}
  .header{height:auto;padding:10px 16px;flex-wrap:wrap;gap:8px}
  .header-tabs{width:100%;justify-content:center}
}
</style>
</head>
<body>

<div class="header">
  <svg width="34" height="34" viewBox="0 0 34 34" style="flex-shrink:0">
    <rect x="4" y="24" width="5" height="8" rx="1" fill="#6EE7B7"/>
    <rect x="11" y="18" width="5" height="14" rx="1" fill="#93C5FD"/>
    <rect x="18" y="12" width="5" height="20" rx="1" fill="#FCA5A5"/>
    <rect x="25" y="6"  width="5" height="26" rx="1" fill="#FCD34D"/>
    <line x1="2" y1="32" x2="32" y2="32" stroke="#D0E8FF" stroke-width="2"/>
    <line x1="2" y1="2"  x2="2"  y2="32" stroke="#D0E8FF" stroke-width="2"/>
  </svg>
  <div>
    <div class="header-title">Data Detective</div>
    <div class="header-sub">Chapter 15 · Bar Graphs &amp; Data</div>
  </div>
  <div class="header-tabs">
    <button class="tab on" onclick="switchTab('build')">Build a Chart</button>
    <button class="tab" onclick="switchTab('read')">Read a Chart</button>
    <button class="tab" onclick="switchTab('practice')">Practice</button>
  </div>
</div>

<div class="main">

<!-- ══ BUILD ══ -->
<div class="pnl on" id="pnl-build">
  <div class="card">
    <div class="card-head" id="build-head" style="background:var(--teal)">
      <span id="build-head-icon" style="font-size:20px">✏️</span>
      <span id="build-head-title">My Stationery Count</span>
    </div>
    <div class="card-body">
      <div class="build-btns" id="build-ds-btns"></div>
      <div class="scenario-intro">
        <div class="scenario-intro-icon" id="scenario-icon">🎒</div>
        <div class="scenario-intro-text" id="scenario-text"></div>
      </div>

      <!-- Two-column: counters left, live chart right -->
      <div class="build-layout">
        <div class="count-list" id="count-list"></div>
        <div class="chart-panel">
          <div class="chart-label" id="chart-panel-label">Your chart will appear here as you count!</div>
          <canvas id="build-canvas" width="500" height="280"></canvas>
        </div>
      </div>

      <div class="action-row">
        <button class="check-btn" onclick="buildChart()">✓ Done — Show Results!</button>
        <button class="reset-btn" onclick="resetBuild()">Reset</button>
      </div>
      <div class="check-result" id="build-result"></div>
    </div>
  </div>
</div>

<!-- ══ READ ══ -->
<div class="pnl" id="pnl-read">
  <div class="score-bar">
    <div class="score-num" id="read-score">0 / 0</div>
    <div class="score-lbl">correct answers</div>
    <button class="new-chart-btn" onclick="nextReadChart()">New chart →</button>
  </div>
  <div class="card">
    <div class="card-head" id="read-head" style="background:var(--navy)">
      <span id="read-head-icon" style="font-size:20px">📊</span>
      <span id="read-head-title">Loading…</span>
    </div>
    <div class="card-body">
      <canvas id="read-canvas" width="600" height="280" class="read-chart-canvas"></canvas>
      <div id="read-questions"></div>
    </div>
  </div>
</div>

<!-- ══ PRACTICE ══ -->
<div class="pnl" id="pnl-practice">
  <div class="pr-card">
    <div class="pr-q" id="pr-q">Loading…</div>
    <div class="pr-opts" id="pr-opts"></div>
    <div class="pr-fb" id="pr-fb"></div>
    <button class="next-btn" onclick="nextPQ()">Next question →</button>
  </div>
</div>

</div><!-- /main -->

<script>
// ── DATASETS ─────────────────────────────────────────────────────────────────
const BUILD_DS = [
  {
    id: 'stationery', title: 'My Stationery Count', icon: '✏️', color: '#0D7A7A',
    scenarioIcon: '🎒',
    scenario: 'Look inside your pencil case or school bag. Count each item and tap + to add — watch your bar chart grow in real time!',
    items: [
      { label: 'Pencils',    emoji: '✏️',  color: '#1A3A6B', bg: '#D0E8FF' },
      { label: 'Pens',       emoji: '🖊️',  color: '#9A1060', bg: '#FCE7F3' },
      { label: 'Erasers',    emoji: '🧽',  color: '#0D7A7A', bg: '#CCFBF1' },
      { label: 'Rulers',     emoji: '📏',  color: '#3D8A10', bg: '#DCFCE7' },
      { label: 'Sharpeners', emoji: '🔧',  color: '#B87808', bg: '#FEF3C7' },
    ],
    insight: (items, vals) => {
      const total = vals.reduce((a, b) => a + b, 0);
      const max = Math.max(...vals);
      const maxItem = items[vals.indexOf(max)];
      return `You have <strong>${total}</strong> items altogether. You have the most ${maxItem.emoji} <strong>${maxItem.label}</strong> (${max})!`;
    }
  },
  {
    id: 'books', title: "Today's School Bag", icon: '📚', color: '#1A3A6B',
    scenarioIcon: '🎒',
    scenario: "Open your school bag. Count how many books or notebooks you have for each subject today, then tap + to enter them!",
    items: [
      { label: 'Maths',   emoji: '🔢', color: '#1A3A6B', bg: '#D0E8FF' },
      { label: 'English', emoji: '📖', color: '#9A1060', bg: '#FCE7F3' },
      { label: 'Science', emoji: '🔬', color: '#0D7A7A', bg: '#CCFBF1' },
      { label: 'Hindi',   emoji: '🪔', color: '#B87808', bg: '#FEF3C7' },
      { label: 'EVS',     emoji: '🌿', color: '#3D8A10', bg: '#DCFCE7' },
    ],
    insight: (items, vals) => {
      const total = vals.reduce((a, b) => a + b, 0);
      const max = Math.max(...vals);
      const maxItem = items[vals.indexOf(max)];
      return `Your bag has <strong>${total}</strong> books today. You have the most books for ${maxItem.emoji} <strong>${maxItem.label}</strong>!`;
    }
  },
  {
    id: 'colours', title: 'My Colour Pencils', icon: '🖍️', color: '#B87808',
    scenarioIcon: '🎨',
    scenario: 'Group your colour pencils or crayons by colour family and count each group. Tap + for each one you count!',
    items: [
      { label: 'Red / Pink',      emoji: '🔴', color: '#DC2626', bg: '#FEE2E2' },
      { label: 'Blue / Purple',   emoji: '🔵', color: '#1A3A6B', bg: '#D0E8FF' },
      { label: 'Green',           emoji: '🟢', color: '#3D8A10', bg: '#DCFCE7' },
      { label: 'Yellow / Orange', emoji: '🟡', color: '#B87808', bg: '#FEF3C7' },
      { label: 'Other',           emoji: '⚪', color: '#6878A8', bg: '#E8F0FC' },
    ],
    insight: (items, vals) => {
      const total = vals.reduce((a, b) => a + b, 0);
      const max = Math.max(...vals);
      const maxItem = items[vals.indexOf(max)];
      return `You have <strong>${total}</strong> colour pencils altogether. Your biggest group is ${maxItem.emoji} <strong>${maxItem.label}</strong> (${max})!`;
    }
  },
];

const PAD = { top: 24, right: 16, bottom: 56, left: 40 };

let curBuildIdx = 0;
let buildValues = [];

const buildCvs = document.getElementById('build-canvas');
const buildCtx = buildCvs.getContext('2d');

function getDs() { return BUILD_DS[curBuildIdx]; }

// ── Render the stepper cards on the left ────────────────────────────────────
function renderCountList() {
  const ds = getDs();
  const list = document.getElementById('count-list');
  list.innerHTML = '';
  ds.items.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'count-item';
    div.id = 'ci-' + i;
    div.style.background = item.bg;
    div.style.borderColor = item.color + '44';
    div.innerHTML = `
      <div class="count-left">
        <span class="count-emoji">${item.emoji}</span>
        <span class="count-label" style="color:${item.color}">${item.label}</span>
      </div>
      <div class="stepper" id="stepper-${i}" style="border-color:${item.color}44;color:${item.color}">
        <button class="s-btn" id="sub-${i}" onclick="changeVal(${i},-1)" disabled aria-label="Remove 1">−</button>
        <div class="s-num" id="val-${i}" style="border-color:${item.color}44">0</div>
        <button class="s-btn" onclick="changeVal(${i},1)" aria-label="Add 1">+</button>
      </div>`;
    list.appendChild(div);
  });
}

// ── Update a value and immediately redraw chart ──────────────────────────────
function changeVal(i, delta) {
  buildValues[i] = Math.max(0, Math.min(30, (buildValues[i] || 0) + delta));
  document.getElementById('val-' + i).textContent = buildValues[i];
  const sub = document.getElementById('sub-' + i);
  if (sub) sub.disabled = buildValues[i] <= 0;
  // style the card to show it's been filled in
  const ci = document.getElementById('ci-' + i);
  const ds = getDs();
  if (buildValues[i] > 0) {
    ci.style.borderColor = ds.items[i].color + 'AA';
    ci.style.boxShadow = '0 2px 8px ' + ds.items[i].color + '22';
  } else {
    ci.style.borderColor = ds.items[i].color + '44';
    ci.style.boxShadow = '';
  }
  drawBuildChart();
}

// ── Draw the chart (blank scaffold when all zeros, fills as values increase) ─
function drawBuildChart() {
  const ds = getDs();
  const CW = buildCvs.width, CH = buildCvs.height;
  const W = CW - PAD.left - PAD.right, H = CH - PAD.top - PAD.bottom;
  const hasAny = buildValues.some(v => v > 0);
  const maxVal = hasAny ? Math.max(...buildValues, 1) : 10;
  const n = ds.items.length;
  const gap = Math.floor(W / n);
  const barW = Math.floor(gap * 0.56);

  buildCtx.clearRect(0, 0, CW, CH);

  // Subtle background grid fill
  buildCtx.fillStyle = '#F8FAFE';
  buildCtx.fillRect(PAD.left, PAD.top, W, H);

  // Y grid + labels
  const step = maxVal <= 5 ? 1 : maxVal <= 10 ? 2 : maxVal <= 20 ? 4 : 5;
  for (let v = 0; v <= maxVal; v += step) {
    const y = PAD.top + H - Math.round((v / maxVal) * H);
    buildCtx.strokeStyle = '#C8D8F0';
    buildCtx.lineWidth = 1;
    buildCtx.setLineDash([4, 3]);
    buildCtx.beginPath();
    buildCtx.moveTo(PAD.left, y);
    buildCtx.lineTo(PAD.left + W, y);
    buildCtx.stroke();
    buildCtx.setLineDash([]);
    buildCtx.fillStyle = '#6878A8';
    buildCtx.font = 'bold 10px "Space Mono",monospace';
    buildCtx.textAlign = 'right';
    buildCtx.textBaseline = 'middle';
    buildCtx.fillText(v, PAD.left - 5, y);
  }

  // Axes (draw after grid so they sit on top)
  buildCtx.strokeStyle = '#243060';
  buildCtx.lineWidth = 2.5;
  buildCtx.lineCap = 'square';
  buildCtx.beginPath();
  buildCtx.moveTo(PAD.left, PAD.top);
  buildCtx.lineTo(PAD.left, PAD.top + H);
  buildCtx.lineTo(PAD.left + W, PAD.top + H);
  buildCtx.stroke();

  // Bars (or empty column slots)
  ds.items.forEach((item, i) => {
    const cx = PAD.left + i * gap + Math.floor(gap / 2);
    const x = cx - Math.floor(barW / 2);
    const v = buildValues[i] || 0;

    if (v > 0) {
      const bH = Math.round((v / maxVal) * H);
      // Bar fill with subtle top-to-bottom alpha blend
      buildCtx.fillStyle = item.color;
      buildCtx.globalAlpha = 0.9;
      buildCtx.beginPath();
      buildCtx.roundRect(x, PAD.top + H - bH, barW, bH, [5, 5, 0, 0]);
      buildCtx.fill();
      buildCtx.globalAlpha = 1;
      // Top highlight stripe
      buildCtx.fillStyle = 'rgba(255,255,255,0.18)';
      buildCtx.beginPath();
      buildCtx.roundRect(x, PAD.top + H - bH, barW, Math.min(8, bH), [5, 5, 0, 0]);
      buildCtx.fill();
      // Value label
      const lblY = bH > 26 ? PAD.top + H - bH + 5 : PAD.top + H - bH - 6;
      buildCtx.fillStyle = bH > 26 ? 'rgba(255,255,255,0.95)' : item.color;
      buildCtx.font = 'bold 12px "Space Mono",monospace';
      buildCtx.textAlign = 'center';
      buildCtx.textBaseline = bH > 26 ? 'top' : 'bottom';
      buildCtx.fillText(v, cx, lblY);
    } else {
      // Empty slot: dashed ghost column
      buildCtx.strokeStyle = item.color + '30';
      buildCtx.lineWidth = 1.5;
      buildCtx.setLineDash([4, 4]);
      buildCtx.beginPath();
      buildCtx.roundRect(x, PAD.top + 4, barW, H - 4, [5, 5, 0, 0]);
      buildCtx.stroke();
      buildCtx.setLineDash([]);
      // "?" hint inside empty bar
      buildCtx.fillStyle = item.color + '40';
      buildCtx.font = 'bold 16px "Space Mono",monospace';
      buildCtx.textAlign = 'center';
      buildCtx.textBaseline = 'middle';
      buildCtx.fillText('?', cx, PAD.top + H / 2);
    }

    // Emoji
    buildCtx.font = '16px serif';
    buildCtx.textAlign = 'center';
    buildCtx.textBaseline = 'top';
    buildCtx.globalAlpha = 1;
    buildCtx.fillText(item.emoji, cx, PAD.top + H + 6);
    // Label
    buildCtx.fillStyle = v > 0 ? '#243060' : '#9AA3B2';
    buildCtx.font = (v > 0 ? 'bold' : '') + ' 9px "Space Mono",monospace';
    buildCtx.textAlign = 'center';
    buildCtx.textBaseline = 'top';
    const lbl = item.label.length > 10 ? item.label.substring(0, 10) : item.label;
    buildCtx.fillText(lbl, cx, PAD.top + H + 26);
  });

  // Centre "start counting" message if nothing entered yet
  if (!hasAny) {
    buildCtx.fillStyle = 'rgba(104,120,168,0.45)';
    buildCtx.font = 'italic 13px "Instrument Serif",serif';
    buildCtx.textAlign = 'center';
    buildCtx.textBaseline = 'middle';
    buildCtx.fillText('Tap + to start counting — your bars will appear here!', PAD.left + W / 2, PAD.top + H / 2 - 10);
  }

  // Update the panel sub-label
  const filled = buildValues.filter(v => v > 0).length;
  const total = ds.items.length;
  const lbl = document.getElementById('chart-panel-label');
  if (filled === 0) lbl.textContent = 'Your chart will appear here as you count!';
  else if (filled < total) lbl.textContent = `${filled} of ${total} items counted — keep going!`;
  else lbl.textContent = 'All items counted! Hit "Done" to see your results.';
}

// ── Build / Done button ──────────────────────────────────────────────────────
function buildChart() {
  const hasAny = buildValues.some(v => v > 0);
  const res = document.getElementById('build-result');
  if (!hasAny) {
    res.textContent = 'Count at least one item first, then tap Done!';
    res.className = 'check-result no';
    return;
  }
  const ds = getDs();
  res.innerHTML = '🎉 ' + ds.insight(ds.items, [...buildValues]);
  res.className = 'check-result ok';
  drawBuildChart();
}

function resetBuild() {
  buildValues = getDs().items.map(() => 0);
  renderCountList();
  drawBuildChart();
  document.getElementById('build-result').textContent = '';
}

function buildDsBtns() {
  const c = document.getElementById('build-ds-btns'); c.innerHTML = '';
  BUILD_DS.forEach((ds, i) => {
    const b = document.createElement('button');
    b.className = 'ds-btn' + (i === curBuildIdx ? ' on' : '');
    if (i === curBuildIdx) b.style.background = ds.color;
    b.textContent = ds.icon + ' ' + ['Stationery', 'Books', 'Colours'][i];
    b.onclick = () => { curBuildIdx = i; buildDsBtns(); initBuild(); };
    c.appendChild(b);
  });
}

function sizeCanvas() {
  const pw = buildCvs.parentElement.offsetWidth || 500;
  buildCvs.width = pw - 24;
  buildCvs.height = Math.round((pw - 24) * 0.58);
}

function initBuild() {
  const ds = getDs();
  document.getElementById('build-head-icon').textContent = ds.icon;
  document.getElementById('build-head-title').textContent = ds.title;
  document.getElementById('build-head').style.background = ds.color;
  document.getElementById('scenario-icon').textContent = ds.scenarioIcon;
  document.getElementById('scenario-text').textContent = ds.scenario;
  buildValues = ds.items.map(() => 0);
  sizeCanvas();
  renderCountList();
  drawBuildChart();
  document.getElementById('build-result').textContent = '';
}

let curReadIdx = 0, readScore = 0, readTotal = 0;
const readCvs = document.getElementById('read-canvas');
const readCtx = readCvs.getContext('2d');

function drawReadChart() {
  const ds = READ_DS[curReadIdx];
  const CW = readCvs.width, CH = readCvs.height;
  const W = CW - PAD.left - PAD.right, H = CH - PAD.top - PAD.bottom;
  const maxVal = Math.max(...ds.items.map(i => i.count));
  const n = ds.items.length;
  const gap = Math.floor(W / n);
  const barW = Math.floor(gap * 0.56);

  readCtx.clearRect(0, 0, CW, CH);
  readCtx.fillStyle = '#F8FAFE';
  readCtx.fillRect(PAD.left, PAD.top, W, H);

  const step = maxVal <= 5 ? 1 : maxVal <= 10 ? 2 : maxVal <= 20 ? 4 : 5;
  for (let v = 0; v <= maxVal; v += step) {
    const y = PAD.top + H - Math.round((v / maxVal) * H);
    readCtx.strokeStyle = '#C8D8F0'; readCtx.lineWidth = 1; readCtx.setLineDash([4, 3]);
    readCtx.beginPath(); readCtx.moveTo(PAD.left, y); readCtx.lineTo(PAD.left + W, y); readCtx.stroke();
    readCtx.setLineDash([]);
    readCtx.fillStyle = '#6878A8'; readCtx.font = 'bold 10px "Space Mono",monospace';
    readCtx.textAlign = 'right'; readCtx.textBaseline = 'middle';
    readCtx.fillText(v, PAD.left - 4, y);
  }

  readCtx.strokeStyle = '#243060'; readCtx.lineWidth = 2.5;
  readCtx.beginPath();
  readCtx.moveTo(PAD.left, PAD.top);
  readCtx.lineTo(PAD.left, PAD.top + H);
  readCtx.lineTo(PAD.left + W, PAD.top + H);
  readCtx.stroke();

  ds.items.forEach((item, i) => {
    const cx = PAD.left + i * gap + Math.floor(gap / 2);
    const x = cx - Math.floor(barW / 2);
    const bH = Math.round((item.count / maxVal) * H);
    readCtx.fillStyle = item.color;
    readCtx.globalAlpha = 0.9;
    readCtx.beginPath(); readCtx.roundRect(x, PAD.top + H - bH, barW, bH, [5, 5, 0, 0]); readCtx.fill();
    readCtx.globalAlpha = 1;
    readCtx.fillStyle = 'rgba(255,255,255,0.18)';
    readCtx.beginPath(); readCtx.roundRect(x, PAD.top + H - bH, barW, Math.min(8, bH), [5, 5, 0, 0]); readCtx.fill();
    const lblY = bH > 26 ? PAD.top + H - bH + 5 : PAD.top + H - bH - 6;
    readCtx.fillStyle = bH > 26 ? '#fff' : item.color;
    readCtx.font = 'bold 12px "Space Mono",monospace'; readCtx.textAlign = 'center';
    readCtx.textBaseline = bH > 26 ? 'top' : 'bottom';
    readCtx.fillText(item.count, cx, lblY);
    readCtx.font = '16px serif'; readCtx.textAlign = 'center'; readCtx.textBaseline = 'top';
    readCtx.fillText(item.emoji, cx, PAD.top + H + 6);
    readCtx.fillStyle = '#243060'; readCtx.font = 'bold 9px "Space Mono",monospace';
    readCtx.textAlign = 'center'; readCtx.textBaseline = 'top';
    const lbl = item.label.length > 8 ? item.label.substring(0, 8) : item.label;
    readCtx.fillText(lbl, cx, PAD.top + H + 26);
  });
}

function renderReadQuestions() {
  const ds = READ_DS[curReadIdx];
  const qc = document.getElementById('read-questions'); qc.innerHTML = '';
  ds.questions.forEach((q, qi) => {
    const card = document.createElement('div'); card.className = 'q-card';
    card.innerHTML = '<div class="q-num">Question ' + (qi + 1) + '</div><div class="q-text">' + q.q + '</div><div class="q-opts" id="qo-' + qi + '"></div><div class="q-fb" id="qf-' + qi + '"></div>';
    qc.appendChild(card);
    [...q.opts].sort(() => Math.random() - .5).forEach(o => {
      const b = document.createElement('button'); b.className = 'q-opt'; b.textContent = o;
      b.onclick = () => {
        document.querySelectorAll('#qo-' + qi + ' .q-opt').forEach(x => x.onclick = null);
        const ok = o === q.ans;
        b.classList.add(ok ? 'correct' : 'wrong');
        if (!ok) document.querySelectorAll('#qo-' + qi + ' .q-opt').forEach(x => { if (x.textContent === q.ans) x.classList.add('correct'); });
        document.getElementById('qf-' + qi).textContent = (ok ? '✓ ' : '✗ ') + q.exp;
        document.getElementById('qf-' + qi).className = 'q-fb ' + (ok ? 'ok' : 'no');
        readTotal++; if (ok) readScore++;
        document.getElementById('read-score').textContent = readScore + ' / ' + readTotal;
      };
      document.getElementById('qo-' + qi).appendChild(b);
    });
  });
}

function initRead() {

  const maxW = Math.min(readCvs.parentElement.offsetWidth || 600, 600);
  readCvs.width = maxW; readCvs.height = Math.round(maxW * 0.47);
  drawReadChart(); renderReadQuestions();
}

function nextReadChart() { curReadIdx = (curReadIdx + 1) % READ_DS.length; initRead(); }

// ── PRACTICE ──────────────────────────────────────────────────────────────────
const PQ = [
  { q: 'A bar chart: Pencils=8, Pens=5, Erasers=3. Which bar is tallest?', ans: 'Pencils', opts: ['Pens','Pencils','Erasers','They are equal'], exp: 'Pencils = 8 is the largest number.' },
  { q: 'What does |||| | represent in a tally chart?', ans: '6', opts: ['5','6','7','4'], exp: 'Five strokes in a group plus one more = 6.' },
  { q: 'Riya has 6 pencils, 4 pens, 2 erasers. Total items?', ans: '12', opts: ['10','11','12','13'], exp: '6 + 4 + 2 = 12.' },
  { q: 'Books: Maths=4, English=2, Science=4. Which subject has the fewest books?', ans: 'English', opts: ['Maths','English','Science','They are equal'], exp: 'English = 2 — the shortest bar.' },
  { q: 'The MODE is the category with the…', ans: 'Highest bar', opts: ['Shortest bar','Highest bar','Middle bar','Tallest label'], exp: 'Mode = most common = tallest bar.' },
  { q: 'Colour pencils: Red=5, Blue=8, Green=3. How many more Blue than Green?', ans: '5', opts: ['3','4','5','6'], exp: '8 − 3 = 5.' },
  { q: 'The vertical axis (y-axis) on a bar chart shows:', ans: 'The count (how many)', opts: ['The categories','The count (how many)','The title','The colours'], exp: 'The vertical axis shows numbers — how many.' },
  { q: 'Arjun has 3 pencils, 3 pens, 3 erasers. Which bar is shortest?', ans: 'They are all equal', opts: ['Pencils','Pens','Erasers','They are all equal'], exp: 'All three have the same count — 3 each.' },
];
let pqUsed = [];
function nextPQ() {
  if (pqUsed.length >= PQ.length) pqUsed = [];
  let idx; do { idx = Math.floor(Math.random() * PQ.length); } while (pqUsed.includes(idx));
  pqUsed.push(idx);
  const q = PQ[idx];
  document.getElementById('pr-q').textContent = q.q;
  document.getElementById('pr-fb').textContent = ''; document.getElementById('pr-fb').className = 'pr-fb';
  const opts = document.getElementById('pr-opts'); opts.innerHTML = '';
  [...q.opts].sort(() => Math.random() - .5).forEach(o => {
    const b = document.createElement('button'); b.className = 'pr-opt'; b.textContent = o;
    b.onclick = () => {
      opts.querySelectorAll('.pr-opt').forEach(x => x.onclick = null);
      const ok = o === q.ans;
      b.classList.add(ok ? 'correct' : 'wrong');
      if (!ok) opts.querySelectorAll('.pr-opt').forEach(x => { if (x.textContent === q.ans) x.classList.add('correct'); });
      document.getElementById('pr-fb').textContent = (ok ? '✓ Correct! ' : '✗ Not quite. ') + q.exp;
      document.getElementById('pr-fb').className = 'pr-fb ' + (ok ? 'ok' : 'no');
    };
    opts.appendChild(b);
  });
}

// ── TAB SWITCH ────────────────────────────────────────────────────────────────
function switchTab(t) {
  ['build','read','practice'].forEach(x => document.getElementById('pnl-' + x).classList.toggle('on', x === t));
  document.querySelectorAll('.tab').forEach((b, i) => b.classList.toggle('on', ['build','read','practice'][i] === t));
  if (t === 'practice') nextPQ();
  if (t === 'read') initRead();
  if (t === 'build') { buildDsBtns(); initBuild(); }
}

window.addEventListener('resize', () => {
  if (document.getElementById('pnl-build').classList.contains('on')) { sizeCanvas(); drawBuildChart(); }
  if (document.getElementById('pnl-read').classList.contains('on')) initRead();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
buildDsBtns(); initBuild(); initRead(); nextPQ();
